server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — forward all backend paths to the api service
    location ~ ^/(api|agent|health|kb|library|papers|qa|research-pipeline|research-runs|system|tasks) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for all other routes (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
