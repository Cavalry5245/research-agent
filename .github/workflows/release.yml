name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  packages: write    # push images to GHCR (ghcr.io)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for auto release notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Quickstart

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ResearchAgent
            cp .env.example .env   # fill in LLM_API_KEY
            docker compose up -d
            ```

            Open http://localhost for the React UI, http://localhost:8000/docs for the API.

            See [QUICKSTART.md](QUICKSTART.md) for details.

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/researchagent-api:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/researchagent-api:${{ github.ref_name }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/researchagent-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/researchagent-frontend:${{ github.ref_name }}
